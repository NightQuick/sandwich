<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" name="viewport" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="public/styles/main.css" />
    <link rel="stylesheet" href="public/styles/basket.css" />
    <link rel="stylesheet" href="public/styles/modal.css" />
    <link rel="stylesheet" href="public/styles/order.css" />
    <link rel="stylesheet" href="public/styles/phone.css" />
    <title>Burgers</title>
  </head>
  <body>
    <header>
      <span id="heading"> СДЕЛАЙТЕ ЗАКАЗ НАПРЯМУЮ ИЗ РЕСТОРАНА </span>
    </header>
    <div id="order-list"></div>
    <div id="main-sheet">
      <div id="active-panel">
        <table id="menu-switcher"></table>
        <div id="basket">
          <div id="basket-description">
            <div id="basket-image">
              <img id="basket-logo" src="./i/shopping-basket.svg" alt="" />
              <div id="basket-shadow"></div>
            </div>
            <span id="basket-name">Корзина</span>
          </div>

          <div id="basket-app"></div>
        </div>
      </div>
      <div id="menu-wrapper"></div>
    </div>

    <div id="modal">
      <div id="modal-window">
        <div id="modal-header">
          <span id="header-text">Выберите размер сендвича</span>
          <button id="close-modal">×</button>
        </div>
        <div id="modal-content">
          <div id="modal-switcher-wrapper"><table id="ingredients-switcher"></table></div>

          <div id="modal-buttons">
            <button class="modal-switcher" id="previous-modal">
              <span class="modal-button-arrow" id="previous-modal-arrow">&lt;</span>
              <span class="modal-button-text" id="previous-modal-text">НАЗАД</span>
            </button>
            <button class="modal-switcher" id="next-modal">
              <span class="modal-button-text" id="next-modal-text">ВПЕРЕД</span>
              <span class="modal-button-arrow" id="next-modal-arrow">></span>
            </button>
          </div>
          <div id="modal-menu-wrapper">
            <div id="modal-menu"></div>
          </div>
          <div class="modal-footer" id="modal-footer"></div>
        </div>
      </div>
    </div>

    <template id="basket-content-template">
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </template>
    <div id="order-app"></div>
    <script src="./public/script/main.ts" type="module"></script>
    <script src="public/script/migrating.ts" type="module"></script>
  </body>
</html>
